
<!doctype html>
<html lang="es">
<head>
  <link rel="stylesheet" href="main.css">
  <meta charset="UTF-8">
  <title>fabrica de bicicletas - Armados al momento</title>
</head>
<body>

<header>
  <h1>fabrica de bicicletas</h1>
  <p>armamos al momento</p>
</header>

<main>
  <form>
    <h2>Tu pedido</h2>

    <section>
      <h3>Tus datos</h3>
      <label for="nombre">Nombre Completo</label>
      <input type="text" id="nombre" name="nombre" required>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="telefono">Teléfono</label>
      <input type="text" id="telefono" name="telefono">
    </section>

    <section>
      <h3>Precios</h3>
      <div class="opcion-radio">
        <input type="radio" id="chica" name="tamanio" value="chica">
        <label for="chica">Barata (120000)</label>
      </div>
      <div class="opcion-radio">
        <input type="radio" id="mediana" name="tamanio" value="mediana">
        <label for="mediana">Mediano (300000)</label>
      </div>
      <div class="opcion-radio">
        <input type="radio" id="grande" name="tamanio" value="grande">
        <label for="grande">Caro (500000)</label>
      </div>
    </section>

    <section>
      <h3>Tipo de Bici</h3>
      <label for="masa">Elegí tu Bici</label>
      <select id="masa" name="masa" required>
        <option value="">-- Elegí una --</option>
        <option value="clasica">Clásica</option>
        <option value="delgada">Rodado 26</option>
        <option value="rellena">Rodado 29</option>
      </select>
    </section>

    <section>
      <h3>Elementos extra</h3>
      <div class="opcion-checkbox">
        <input type="checkbox" id="Cuadro" name="partes_cuadro">
        <label for="Cuadro">Cuadro</label>
      </div>
      <div class="opcion-checkbox">
        <input type="checkbox" id="Manubrio" name="partes_Manubrio">
        <label for="Manubrio">Manubrio</label>
      </div>
      <div class="opcion-checkbox">
        <input type="checkbox" id="asientos" name="partes_asientos">
        <label for="asientos">Asientos</label>
      </div>
      <div class="opcion-checkbox">
        <input type="checkbox" id="Frenos" name="partes_Frenos">
        <label for="Frenos">Frenos</label>
      </div>
      <div class="opcion-checkbox">
        <input type="checkbox" id="Ruedas" name="partes_Ruedas">
        <label for="Ruedas">Ruedas</label>
      </div>
    </section>

    <section>
      <h3>Cantidad</h3>
      <label for="cantidad">¿Cuántas Bicis?</label>
      <input type="number" id="cantidad" name="cantidad" min="1" max="10" value="1" required>
    </section>

    <section>
      <h3>Comentarios</h3>
      <label for="comentarios">¿Algo más que quieras avisarnos?</label>
      <textarea id="comentarios" name="comentarios" rows="4"></textarea>
    </section>

    <button type="submit">Hacer pedido</button>
  </form>
</main>

<footer>
  <p>bicleteria — Lima Peru</p>
</footer>

</body>
</html>
