<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Archivo:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1 class="logo">MOVIE EXPLORER</h1>

      <section class="controles">
        <input type="text" id="busqueda" placeholder="Buscar película..." />
        <select id="genero">
          <option value="">Todos los géneros</option>
          <option value="Acción">Acción</option>
          <option value="Drama">Drama</option>
          <option value="Ciencia Ficción">Ciencia Ficción</option>
          <option value="Comedia">Comedia</option>
          <option value="Terror">Terror</option>
          <option value="Animación">Animación</option>
          <option value="Suspenso">Suspenso</option>
        </select>
      </section>

      <hr class="linea" />

      <p id="contador" class="contador">14 películas encontradas</p>

      <section id="grilla" class="grilla"></section>

      <p id="vacio" class="vacio oculto">No se encontraron resultados.</p>
    </main>

    <footer class="pie">
      <p>Hecho con HTML, CSS y JavaScript — Clase 7</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
